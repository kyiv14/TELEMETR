name: Run Telemetr Parser

on:
  workflow_dispatch: # Кнопка для ручного запуска в интерфейсе GitHub
  schedule:
    - cron: '0 6 * * 1' # Автозапуск каждый понедельник в 09:00 по Киеву / МСК (06:00 UTC)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ИСПРАВЛЕНО: убрано лишнее "actions/" из пути репозитория экшена
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run parser script
      env:
        TELEMETR_API_KEY: ${{ secrets.TELEMETR_API_KEY }}
      run: python telemetr_parser.py

    - name: Upload Excel Result
      uses: actions/upload-artifact@v4
      with:
        name: telemetr-leads-excel
        path: vpn_leads_telemetr.xlsx
        retention-days: 7
